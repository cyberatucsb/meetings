services:
  echo:
    build: ./server
    ports:
      - "34598:34598"

  stager:
    build: ./stager
    ports:
      - "34249:34249"
      - "34390:34390"

  minecraft:
    image: itzg/minecraft-server:java17
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      VERSION: "1.17.1"
      ONLINE_MODE: "FALSE"
      JVM_OPTS: "-Dcom.sun.jndi.ldap.object.trustURLCodebase=true -Dlog4j2.formatMsgNoLookups=false"
